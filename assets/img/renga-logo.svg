<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" role="img" aria-labelledby="title desc">
  <title id="title">Renga</title>
  <desc id="desc">Векторный логотип Renga для сайта базы вопросов и ответов</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7e91a1"/>
      <stop offset="1" stop-color="#526879"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a68"/>
      <stop offset="1" stop-color="#f05255"/>
    </linearGradient>
  </defs>

  <!-- Геометрический знак, упрощённая векторная версия по референсу -->
  <g transform="translate(8 12)">
    <polygon points="60,0 112,30 112,88 60,126 8,88 8,30" fill="url(#blue)"/>
    <polygon points="60,28 88,44 88,78 60,96 32,78 32,44" fill="#ffffff" opacity="0.92"/>
    <polygon points="60,36 80,48 80,74 60,88 40,74 40,48" fill="url(#red)"/>
    <path d="M60 36 L60 88" stroke="#ffffff" stroke-width="2" opacity="0.75"/>
    <path d="M40 48 L60 60 L80 48" stroke="#ffffff" stroke-width="2" opacity="0.48" fill="none"/>
    <path d="M40 74 L60 60 L80 74" stroke="#ffffff" stroke-width="2" opacity="0.48" fill="none"/>
    <path d="M8 30 L60 60 L112 30" stroke="#aebbc6" stroke-width="2" opacity="0.5" fill="none"/>
    <path d="M8 88 L60 60 L112 88" stroke="#d6dde3" stroke-width="2" opacity="0.42" fill="none"/>
    <path d="M60 0 L60 126" stroke="#d6dde3" stroke-width="2" opacity="0.35" fill="none"/>
  </g>

  <!-- Wordmark rendered as SVG text for crisp scaling -->
  <text x="155" y="100" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="84" font-weight="500" fill="#637789" letter-spacing="-3">Renga</text>
  <text x="442" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#637789">®</text>
</svg>
